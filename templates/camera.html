<!DOCTYPE html>
<html>
<head>
<title>Camera</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    color:grey;
}
.card{
    border-radius:20px;
}
img{
    max-width:100%;
    height:auto;
}
</style>

</head>

<body>

<div class="container text-center mt-4">

<div class="card bg-dark shadow-lg p-3">

<h3>🎥 Live Face Recognition</h3>

<img src="{{ url_for('video') }}" class="rounded mt-3">

<div class="mt-3">

<a href="/register" class="btn btn-success m-1">➕ Register</a>

{% if session['role'] == 'admin' %}
<a href="/train" class="btn btn-warning m-1">🧠 Train</a>
<a href="/dashboard" class="btn btn-info m-1">📊 Dashboard</a>
{% endif %}

<a href="/logout" class="btn btn-danger m-1">🚪 Logout</a>

</div>

</div>

</div>

</body>
</html>
