<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: linear-gradient(135deg, #1f1c2c, #928dab);
    color: white;
}

.card {
    border-radius: 15px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.btn {
    border-radius: 20px;
}

h1 {
    text-align: center;
    margin: 20px;
}
</style>
</head>

<body>

<h1>🚀 Admin Dashboard</h1>

<div class="container">

<div class="row">

<!-- Attendance -->
<div class="col-md-6">
<div class="card p-3 mb-4">
<h4>📊 Attendance</h4>
<table class="table table-dark table-hover">
<tr><th>Name</th><th>Date</th><th>Time</th></tr>

{% for row in data %}
<tr>
<td>{{row[1]}}</td>
<td>{{row[2]}}</td>
<td>{{row[3]}}</td>
</tr>
{% endfor %}

</table>
</div>
</div>

<!-- Graph -->
<div class="col-md-6">
<div class="card p-3 mb-4">
<h4>📈 Attendance Graph</h4>
<canvas id="chart"></canvas>
</div>
</div>

</div>

<div class="row">

<!-- Pending -->
<div class="col-md-6">
<div class="card p-3 mb-4">
<h4>🟡 Pending Users</h4>

{% for u in pending %}
<div class="d-flex justify-content-between align-items-center mb-2">
<span>{{u}}</span>

<div>
<a href="/approve/{{u}}" class="btn btn-success btn-sm">Approve</a>
<a href="/reject/{{u}}" class="btn btn-danger btn-sm">Reject</a>
</div>
</div>
{% endfor %}

</div>
</div>

<!-- Approved -->
<div class="col-md-6">
<div class="card p-3 mb-4">
<h4>🟢 Approved Users</h4>

{% for u in approved %}
<div class="d-flex justify-content-between align-items-center mb-2">
<span>{{u}}</span>

<a href="/delete_user/{{u}}" class="btn btn-warning btn-sm">Delete</a>
</div>
{% endfor %}

</div>
</div>

</div>

</div>

<script>
let ctx = document.getElementById('chart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: {{ dates|safe }},
        datasets: [{
            label: 'Attendance',
            data: {{ counts|safe }}
        }]
    }
});
</script>

</body>
</html>
